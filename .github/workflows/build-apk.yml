name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build debug APK
      run: ./gradlew assembleDebug
    
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: somnis-de-fusta-debug
        path: android/build/outputs/apk/debug/android-debug.apk
        retention-days: 30
    
    - name: Build release APK (unsigned)
      run: ./gradlew assembleRelease
      continue-on-error: true
    
    - name: Upload release APK (if available)
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: somnis-de-fusta-release
        path: android/build/outputs/apk/release/android-release-unsigned.apk
        retention-days: 30
